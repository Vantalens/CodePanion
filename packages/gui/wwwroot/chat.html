<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemindAI - 对话</title>
    <link rel="stylesheet" href="https://remindai.local/chat.css">
    <script src="https://remindai.local/vendor/remindai-markdown.js"></script>
</head>
<body>
    <div id="app-shell">
        <aside id="conversation-sidebar">
            <div class="brand-row">
                <div class="app-mark">AI</div>
                <div>
                    <h1>RemindAI</h1>
                    <p>本地工作流</p>
                </div>
            </div>
            <div class="sidebar-tools">
                <button class="tool-button active" type="button" data-view="active">当前</button>
                <button class="tool-button" type="button" data-view="waiting">等待</button>
                <button class="tool-button" type="button" data-view="code">产物</button>
            </div>
            <div id="conversation-list" class="conversation-list"></div>
        </aside>

        <main id="conversation-main">
            <header id="conversation-header">
                <div>
                    <div class="crumb">当前工作流</div>
                    <h2 id="conversation-title">当前任务</h2>
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">未连接</span>
                </div>
            </header>
            <section id="chat-container" aria-live="polite"></section>
        </main>

        <aside id="code-browser">
            <header class="code-header">
                <div>
                    <h2>代码检查器</h2>
                    <p id="code-count">0 段代码</p>
                </div>
            </header>
            <div id="code-list" class="code-list"></div>
            <article id="code-preview" class="code-preview">
                <div class="empty-code">
                    <strong>暂无代码产物</strong>
                    <span>选中包含代码的任务后会显示在这里。</span>
                </div>
            </article>
        </aside>
    </div>
    <script src="https://remindai.local/chat.js"></script>
</body>
</html>
