<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://codepanion.local; script-src 'self' https://codepanion.local; style-src 'self' https://codepanion.local; img-src 'self' https://codepanion.local data:; font-src 'self' https://codepanion.local data:; connect-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePanion - 工作流控制台</title>
    <link rel="stylesheet" href="https://codepanion.local/chat.css">
</head>
<body>
    <!-- W-20 重建：工作流控制台 shell。监听式界面（会话流 / 来源面板 / 接力 / 收件箱）已全部移除。
         布局：顶栏（workspace + 连接） / 三栏（workflow & runs & gates | run 时间线 | 详情&人工门） / 底栏状态。 -->
    <div id="app-shell">
        <header id="topbar">
            <div class="brand">CodePanion</div>
            <div class="workspace-bar">
                <label for="workspace-input">workspace</label>
                <input id="workspace-input" type="text" list="workspace-recents" autocomplete="off"
                       placeholder="项目绝对路径（留空=全局）">
                <datalist id="workspace-recents"></datalist>
                <button id="workspace-apply" class="btn" type="button">应用</button>
                <button id="workspace-clear" class="btn" type="button">全局</button>
            </div>
            <div class="conn" title="本地 daemon 连接状态">
                <span class="status-dot"></span>
                <span class="status-text">未连接</span>
            </div>
        </header>

        <div id="console-body">
            <aside id="console-sidebar">
                <section class="side-section">
                    <h3>可执行 workflow</h3>
                    <div id="def-list" class="card-list"></div>
                </section>
                <section class="side-section">
                    <h3>近期运行</h3>
                    <div id="runs-list" class="card-list"></div>
                </section>
                <section class="side-section">
                    <h3>人工门</h3>
                    <div id="gates-list" class="card-list"></div>
                </section>
            </aside>

            <main id="console-center">
                <header id="center-header">
                    <div class="center-title-wrap">
                        <h2 id="center-title">工作流控制台</h2>
                        <span id="center-status" class="run-status-chip"></span>
                    </div>
                    <button id="run-cancel" class="btn danger" type="button" hidden>取消运行</button>
                </header>
                <div id="timeline-empty" class="empty-state">
                    <strong>选择左侧一个运行查看时间线</strong>
                    <span>或点一个 workflow 的「启动」开始新的运行。运行中的步骤输出会实时滚动到这里。</span>
                </div>
                <div id="timeline-steps" class="timeline" hidden></div>
            </main>

            <aside id="console-detail">
                <!-- 人工门决策面板：选中一个 gate 时显示 -->
                <section id="gate-panel" class="detail-section" hidden>
                    <h3>人工门决策</h3>
                    <p id="gate-target" class="detail-meta"></p>
                    <label class="field-label" for="gate-constraints">约束（每行一条，注入续跑 values.constraints）</label>
                    <textarea id="gate-constraints" rows="3" placeholder="例如：保持 TypeScript&#10;不要引入新依赖"></textarea>
                    <label class="field-label" for="gate-message">备注（可选）</label>
                    <input id="gate-message" type="text" autocomplete="off" placeholder="给本次决策的说明">
                    <div class="gate-actions">
                        <button id="gate-approve" class="btn primary" type="button">通过</button>
                        <button id="gate-retry" class="btn" type="button">重试</button>
                        <button id="gate-reject" class="btn danger" type="button">拒绝</button>
                    </div>
                </section>

                <section class="detail-section">
                    <h3>产物 <span id="artifact-count" class="count">0</span></h3>
                    <div id="artifact-list" class="card-list"></div>
                </section>

                <section class="detail-section">
                    <h3>交付摘要</h3>
                    <div class="delivery-actions">
                        <button id="delivery-markdown" class="btn" type="button" disabled>复制 Markdown</button>
                        <button id="delivery-handoff" class="btn" type="button" disabled>复制 Handoff</button>
                    </div>
                    <pre id="delivery-output" class="output-pre">选中一个运行后可拉取交付摘要。</pre>
                </section>

                <section class="detail-section">
                    <h3>步骤输出</h3>
                    <pre id="step-output-detail" class="output-pre">点击中栏某个步骤查看其完整 stdout/stderr。</pre>
                </section>
            </aside>
        </div>

        <footer id="statusbar">
            <span id="board-status">尚未拉取数据。</span>
        </footer>
    </div>
    <script src="https://codepanion.local/chat.js"></script>
</body>
</html>
